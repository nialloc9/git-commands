<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="branchGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Main branch line -->
  <line x1="30" y1="70" x2="170" y2="70" stroke="url(#mainGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Feature branch arc -->
  <path d="M 70 70 Q 100 28 130 28" fill="none" stroke="url(#branchGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="28" x2="155" y2="28" stroke="url(#branchGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Merge back -->
  <path d="M 155 28 Q 165 28 170 70" fill="none" stroke="url(#branchGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 4"/>

  <!-- Commit dots on main -->
  <circle cx="30" cy="70" r="7" fill="#6366f1"/>
  <circle cx="70" cy="70" r="7" fill="#6366f1"/>
  <circle cx="120" cy="70" r="7" fill="#7c3aed"/>
  <circle cx="170" cy="70" r="7" fill="#8b5cf6"/>

  <!-- Commit dots on branch -->
  <circle cx="100" cy="38" r="5.5" fill="#f97316"/>
  <circle cx="130" cy="28" r="5.5" fill="#f97316"/>
  <circle cx="155" cy="28" r="5.5" fill="#ef4444"/>

  <!-- Terminal prompt bracket -->
  <text x="195" y="58" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace" font-size="16" fill="#94a3b8" font-weight="600">&gt;_</text>

  <!-- Title text -->
  <text x="195" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#e2e8f0">git</text>
  <text x="248" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="32" font-weight="300" fill="#94a3b8">commands</text>
</svg>
